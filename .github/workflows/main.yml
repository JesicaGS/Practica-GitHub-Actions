name: Pruebas Automáticas con Maven

on:
  push:
    branches: "main"


jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21' 
        distribution: 'temurin'
        cache: maven 

    - name: Ejecutar pruebas con Maven
      run: mvn test
      working-directory: ./dp
